<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil — RT 37 Network</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg:#04010d;
    --card:#08051a;
    --text:#e0d8ff;
    --text-dim:#6b5f9e;
    --cyan:#00f5ff;
    --pink:#ff00c8;
    --yellow:#f5e642;
    --danger:#ff2d6b;
    --green:#39ff8a;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{background:var(--bg);}
  body{
    min-height:100vh;min-height:100dvh;
    color:var(--text);
    font-family:'Inter',sans-serif;
    background:var(--bg);
    -webkit-tap-highlight-color:transparent;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:'';position:fixed;inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,245,255,0.012) 2px,rgba(0,245,255,0.012) 4px);
    pointer-events:none;z-index:0;
  }
  body::after{
    content:'';position:fixed;inset:0;
    background:linear-gradient(rgba(0,245,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.03) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none;z-index:0;
  }
  .glow-blob{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;opacity:0.12;}
  .glow-blob.cyan{width:300px;height:300px;background:var(--cyan);top:-80px;left:-80px;}
  .glow-blob.pink{width:260px;height:260px;background:var(--pink);bottom:-60px;right:-60px;}

  a{text-decoration:none;color:inherit;}
  button{font-family:inherit;}

  /* TOPBAR */
  .topbar{
    position:sticky;top:0;z-index:50;
    background:rgba(4,1,13,0.92);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(0,245,255,0.1);
    padding:0 16px;
    height:54px;
    display:flex;align-items:center;gap:12px;
  }
  .back-btn{
    width:34px;height:34px;border-radius:50%;
    background:rgba(0,245,255,0.05);
    border:1px solid rgba(0,245,255,0.2);
    color:var(--cyan);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;flex-shrink:0;
  }
  .back-btn svg{width:18px;height:18px;}
  .topbar-title{
    font-family:'Orbitron',sans-serif;
    font-size:13px;font-weight:800;
    color:var(--cyan);letter-spacing:1px;
    text-shadow:0 0 10px rgba(0,245,255,0.4);
  }

  /* PAGE */
  .page{max-width:480px;margin:0 auto;padding:0 16px 100px;position:relative;z-index:1;}

  /* PROFILE HEADER */
  .profile-header{
    display:flex;flex-direction:column;align-items:center;
    padding:28px 0 20px;gap:12px;
  }
  .avatar-wrap{position:relative;cursor:pointer;}
  .avatar-big{
    width:88px;height:88px;border-radius:50%;
    background:linear-gradient(135deg,rgba(0,245,255,0.15),rgba(255,0,200,0.1));
    border:2px solid rgba(0,245,255,0.4);
    display:flex;align-items:center;justify-content:center;
    font-family:'Orbitron',sans-serif;
    font-size:28px;font-weight:900;
    color:var(--cyan);
    box-shadow:0 0 25px rgba(0,245,255,0.2),0 0 50px rgba(0,245,255,0.08);
    overflow:hidden;position:relative;
  }
  .avatar-big img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
  .avatar-edit-overlay{
    position:absolute;inset:0;border-radius:50%;
    background:rgba(0,0,0,0.55);
    display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity .2s;
  }
  .avatar-wrap:hover .avatar-edit-overlay{opacity:1;}
  .avatar-edit-overlay svg{width:22px;height:22px;color:#fff;}
  #fotoInput{display:none;}

  .profile-nama{
    font-family:'Orbitron',sans-serif;
    font-size:18px;font-weight:900;
    color:var(--text);letter-spacing:0.5px;
    text-align:center;
  }
  .profile-kode{
    font-family:'Share Tech Mono',monospace;
    font-size:12px;color:var(--text-dim);
    text-align:center;
  }
  .profile-role-badge{
    font-family:'Share Tech Mono',monospace;
    font-size:10px;font-weight:700;
    padding:3px 10px;border-radius:20px;
    letter-spacing:1px;text-transform:uppercase;
  }
  .role-admin{ background:rgba(150,90,220,0.15);color:#965adc;border:1px solid rgba(150,90,220,0.3); }
  .role-rt{ background:rgba(224,168,71,0.15);color:var(--yellow);border:1px solid rgba(224,168,71,0.3); }
  .role-rw{ background:rgba(230,120,50,0.15);color:#e67832;border:1px solid rgba(230,120,50,0.3); }
  .role-warga{ background:rgba(0,245,255,0.08);color:var(--cyan);border:1px solid rgba(0,245,255,0.25); }
  .role-ustadz{ background:rgba(60,180,120,0.15);color:#3cb478;border:1px solid rgba(60,180,120,0.3); }

  /* SECTION */
  .section{
    background:rgba(8,5,26,0.8);
    border:1px solid rgba(0,245,255,0.1);
    border-radius:16px;
    padding:18px 16px;
    margin-bottom:14px;
    position:relative;
    backdrop-filter:blur(6px);
  }
  .section-title{
    font-family:'Share Tech Mono',monospace;
    font-size:10px;color:var(--cyan);
    letter-spacing:1.5px;text-transform:uppercase;
    opacity:0.7;margin-bottom:14px;
  }
  .section-title::before{content:'// ';opacity:0.5;}

  /* FORM FIELDS */
  .field{margin-bottom:14px;}
  .field:last-child{margin-bottom:0;}
  .field label{
    display:block;font-size:11px;font-weight:600;
    color:var(--text-dim);text-transform:uppercase;
    letter-spacing:0.8px;margin-bottom:6px;
  }
  .field input, .field textarea{
    width:100%;
    background:rgba(0,245,255,0.03);
    border:1px solid rgba(0,245,255,0.12);
    border-radius:10px;
    padding:11px 13px;
    color:var(--text);
    font-size:14px;font-family:'Inter',sans-serif;
    outline:none;
    transition:all .2s;
    caret-color:var(--cyan);
  }
  .field textarea{resize:none;height:80px;line-height:1.5;}
  .field input:focus, .field textarea:focus{
    border-color:rgba(0,245,255,0.4);
    background:rgba(0,245,255,0.05);
    box-shadow:0 0 0 2px rgba(0,245,255,0.07);
  }
  .field input::placeholder,.field textarea::placeholder{color:var(--text-dim);opacity:0.5;}
  .field input:disabled{opacity:0.5;cursor:not-allowed;}

  /* SAVE BTN */
  .save-btn{
    width:100%;
    background:transparent;
    color:var(--cyan);
    border:1px solid rgba(0,245,255,0.45);
    border-radius:12px;
    padding:13px;
    font-size:13px;font-weight:800;
    font-family:'Orbitron',sans-serif;
    letter-spacing:2px;text-transform:uppercase;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;
    transition:all .25s;
    position:relative;overflow:hidden;
    box-shadow:0 0 15px rgba(0,245,255,0.1);
    margin-top:4px;
  }
  .save-btn:hover{
    background:rgba(0,245,255,0.07);
    box-shadow:0 0 25px rgba(0,245,255,0.25);
  }
  .save-btn:disabled{opacity:0.4;cursor:default;}
  .save-btn svg{width:15px;height:15px;}

  /* TOAST */
  .toast{
    position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
    background:rgba(57,255,138,0.12);
    border:1px solid rgba(57,255,138,0.35);
    color:var(--green);
    font-family:'Share Tech Mono',monospace;
    font-size:12px;padding:10px 18px;border-radius:10px;
    white-space:nowrap;
    opacity:0;transition:all .3s;
    z-index:200;
    box-shadow:0 0 15px rgba(57,255,138,0.1);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast.error{
    background:rgba(255,45,107,0.1);
    border-color:rgba(255,45,107,0.35);
    color:#ff5c87;
  }

  /* VIEW MODE */
  .profile-header{
    display:flex;align-items:center;gap:14px;
    padding:20px 0 16px;
  }
  .profile-nama{
    font-size:18px;font-weight:700;
    color:var(--text);
    display:flex;align-items:center;gap:6px;
    margin-bottom:4px;
  }
  .profile-username{
    font-size:13px;color:var(--text-dim);
    margin-bottom:6px;
  }
  .edit-btn{
    margin-left:auto;align-self:flex-start;
    background:rgba(0,245,255,0.06);
    border:1px solid rgba(0,245,255,0.2);
    color:var(--text);
    border-radius:10px;padding:7px 14px;
    font-size:13px;font-weight:600;
    cursor:pointer;
    display:flex;align-items:center;gap:6px;
    white-space:nowrap;
    transition:all .2s;
    flex-shrink:0;
  }
  .edit-btn svg{width:14px;height:14px;}
  .edit-btn:hover{background:rgba(0,245,255,0.1);border-color:var(--cyan);}
  .view-bio{
    font-size:14px;line-height:1.6;
    color:var(--text);
    padding:0 0 16px;
    border-bottom:1px solid rgba(0,245,255,0.07);
    margin-bottom:14px;
  }
  .view-info-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
  .view-info-row{
    display:flex;align-items:center;gap:10px;
    font-size:14px;color:var(--text-dim);
  }
  .view-info-row svg{width:16px;height:16px;flex-shrink:0;color:var(--text-dim);}
  .view-info-row .cyan{color:var(--cyan);}
  .view-tabs{
    display:flex;
    border-bottom:1px solid rgba(0,245,255,0.1);
    margin-bottom:0;
  }
  .view-tab{
    flex:1;background:none;border:none;
    padding:12px 0;font-size:14px;font-weight:600;
    color:var(--text-dim);cursor:pointer;
    position:relative;transition:color .2s;
  }
  .view-tab.active{color:var(--cyan);}
  .view-tab.active::after{
    content:'';position:absolute;bottom:0;left:20%;right:20%;
    height:2px;background:var(--cyan);border-radius:2px;
    box-shadow:0 0 8px var(--cyan);
  }

  /* EDIT MODE */
  .edit-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 0 8px;margin-bottom:8px;
    border-bottom:1px solid rgba(0,245,255,0.08);
  }
  .edit-title{
    font-family:'Orbitron',sans-serif;
    font-size:13px;font-weight:800;
    color:var(--cyan);letter-spacing:1px;
  }
  .cancel-btn{
    background:none;border:none;
    color:var(--text-dim);font-size:14px;
    cursor:pointer;padding:6px;
  }
  .done-btn{
    background:rgba(0,245,255,0.08);
    border:1px solid rgba(0,245,255,0.3);
    color:var(--cyan);font-size:14px;font-weight:700;
    border-radius:8px;padding:6px 14px;
    cursor:pointer;transition:all .2s;
  }
  .done-btn:hover{background:rgba(0,245,255,0.15);}

  /* LOADING */
  .page-loading{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:60vh;gap:14px;
  }
  .spinner{
    width:32px;height:32px;
    border:2px solid rgba(0,245,255,0.15);
    border-top-color:var(--cyan);
    border-radius:50%;
    animation:spin .8s linear infinite;
    box-shadow:0 0 10px rgba(0,245,255,0.2);
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{
    font-family:'Share Tech Mono',monospace;
    font-size:12px;color:var(--text-dim);letter-spacing:1px;
  }

  /* PASSWORD TOGGLE */
  .pw-wrap{position:relative;}
  .pw-wrap input{padding-right:40px;}
  .pw-toggle{
    position:absolute;right:10px;top:50%;transform:translateY(-50%);
    background:none;border:none;color:var(--text-dim);
    cursor:pointer;padding:4px;
  }
  .pw-toggle svg{width:15px;height:15px;display:block;}

  /* DIVIDER */
  .divider{
    height:1px;
    background:linear-gradient(90deg,transparent,rgba(0,245,255,0.1),transparent);
    margin:4px 0 14px;
  }
</style>
</head>
<body>

<div class="glow-blob cyan"></div>
<div class="glow-blob pink"></div>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="topbar-title">PROFIL SAYA</div>
</div>

<div class="page" id="mainContent">
  <div class="page-loading" id="loadingState">
    <div class="spinner"></div>
    <div class="loading-text">MEMUAT DATA...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPA_URL = 'https://iioavwvkdbtmbzcrywtl.supabase.co';
  const SUPA_KEY = 'sb_publishable_4oe4tIZpfngQCpfY8Va4Kg_ns3fliZh';

  const page = document.getElementById('mainContent');
  const toast = document.getElementById('toast');

  // Get user from session
  const sessionUser = JSON.parse(sessionStorage.getItem('rt37_user') || 'null');
  if(!sessionUser){ window.location.href = 'login.html'; }

  let userData = null;

  function showToast(msg, isError=false){
    toast.textContent = msg;
    toast.className = 'toast' + (isError ? ' error' : '');
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function roleBadge(role){
    const labels = {admin:'Admin',rt:'Ketua RT',rw:'Ketua RW',warga:'Warga',ustadz:'Ustadz'};
    return `<span class="profile-role-badge role-${role}">${labels[role]||role}</span>`;
  }

  function initial(nama){ return nama ? nama.charAt(0).toUpperCase() : '?'; }

  function formatTglLahir(val){
    if(!val) return '';
    const d = new Date(val);
    if(isNaN(d)) return val;
    return d.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
  }

  function renderView(u){
    const hasPhoto = u.foto_url && u.foto_url.trim() !== '';
    const namaDisplay = u.nama || '';
    const usernameDisplay = u.username ? `@${u.username}` : '';
    page.innerHTML = `
      <div class="profile-header">
        <div class="avatar-wrap">
          <div class="avatar-big" id="avatarBig">
            ${hasPhoto ? `<img src="${u.foto_url}" id="avatarImg">` : initial(u.nama)}
          </div>
        </div>
        <div style="flex:1;min-width:0;">
          <div class="profile-nama">${namaDisplay}${u.role==='rt'||u.role==='rw'||u.role==='admin'?` <svg style="width:16px;height:16px;vertical-align:middle;color:var(--cyan)" viewBox="0 0 24 24" fill="currentColor"><path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 0 0 1.946-.806 3.42 3.42 0 0 1 4.438 0 3.42 3.42 0 0 0 1.946.806 3.42 3.42 0 0 1 3.138 3.138 3.42 3.42 0 0 0 .806 1.946 3.42 3.42 0 0 1 0 4.438 3.42 3.42 0 0 0-.806 1.946 3.42 3.42 0 0 1-3.138 3.138 3.42 3.42 0 0 0-1.946.806 3.42 3.42 0 0 1-4.438 0 3.42 3.42 0 0 0-1.946-.806 3.42 3.42 0 0 1-3.138-3.138 3.42 3.42 0 0 0-.806-1.946 3.42 3.42 0 0 1 0-4.438 3.42 3.42 0 0 0 .806-1.946 3.42 3.42 0 0 1 3.138-3.138z"/></svg>`:''}
          </div>
          ${usernameDisplay ? `<div class="profile-username">${usernameDisplay}</div>` : ''}
          ${roleBadge(u.role)}
        </div>
        <button class="edit-btn" onclick="renderEdit()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit profil
        </button>
      </div>

      ${u.bio ? `<div class="view-bio">${u.bio}</div>` : ''}

      <div class="view-info-list">
        ${u.no_hp ? `
        <div class="view-info-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.1a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.77 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.16 6.16l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          <span class="cyan">${u.no_hp} (WhatsApp)</span>
        </div>` : ''}
        ${u.alamat ? `
        <div class="view-info-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span>${u.alamat}</span>
        </div>` : ''}
        ${u.tgl_lahir ? `
        <div class="view-info-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span>Lahir ${formatTglLahir(u.tgl_lahir)}</span>
        </div>` : ''}
        <div class="view-info-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>Bergabung ${new Date(u.created_at||Date.now()).toLocaleDateString('id-ID',{month:'long',year:'numeric'})}</span>
        </div>
      </div>

      <div class="view-tabs">
        <button class="view-tab active">Postingan</button>
        <button class="view-tab">Komentar</button>
        <button class="view-tab">Media</button>
      </div>
      <div style="text-align:center;padding:40px 0;color:var(--text-dim);font-size:13px;font-family:'Share Tech Mono',monospace;">
        Belum ada postingan
      </div>
    `;

    // Tab click
    document.querySelectorAll('.view-tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.view-tab').forEach(x=>x.classList.remove('active'));
        t.classList.add('active');
      });
    });
  }

  function renderEdit(){
    const u = userData;
    page.innerHTML = `
      <div class="edit-header">
        <button class="cancel-btn" onclick="renderView(userData)">Batal</button>
        <div class="edit-title">Edit Profil</div>
        <button class="done-btn" onclick="saveProfile()">Simpan</button>
      </div>

      <!-- Avatar -->
      <div style="display:flex;justify-content:center;padding:20px 0 24px;">
        <div class="avatar-wrap" onclick="document.getElementById('fotoInput').click()">
          <div class="avatar-big" id="avatarBig">
            ${u.foto_url ? `<img src="${u.foto_url}" id="avatarImg">` : initial(u.nama)}
          </div>
          <div class="avatar-edit-overlay">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          </div>
        </div>
      </div>
      <input type="file" id="fotoInput" accept="image/*" onchange="handleFotoChange(this)" style="display:none">

      <div class="section">
        <div class="section-title">Info Publik</div>
        <div class="field">
          <label>Nama lengkap</label>
          <input type="text" value="${u.nama||''}" disabled style="opacity:0.4;cursor:not-allowed;">
          <div style="font-size:11px;color:var(--text-dim);margin-top:4px;">Nama hanya bisa diubah oleh pengurus RT</div>
        </div>
        <div class="field">
          <label>Username</label>
          <input type="text" id="fieldUsername" value="${u.username||''}" placeholder="@username">
        </div>
        <div class="field">
          <label>Bio</label>
          <textarea id="fieldBio" placeholder="Ceritakan sedikit tentang dirimu...">${u.bio||''}</textarea>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Kontak & Info</div>
        <div class="field">
          <label>No. WhatsApp</label>
          <input type="tel" id="fieldHp" value="${u.no_hp||''}" placeholder="08xx-xxxx-xxxx">
        </div>
        <div class="field">
          <label>Alamat</label>
          <input type="text" id="fieldAlamat" value="${u.alamat||''}" placeholder="Blok / No. Rumah">
        </div>
        <div class="field">
          <label>Tanggal Lahir</label>
          <input type="date" id="fieldTglLahir" value="${u.tgl_lahir||''}">
        </div>
      </div>

      <div class="section">
        <div class="section-title">Ganti Password</div>
        <div class="field">
          <label>Password lama</label>
          <div class="pw-wrap">
            <input type="password" id="fieldPwLama" placeholder="Password saat ini">
            <button class="pw-toggle" onclick="togglePw('fieldPwLama')" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="field">
          <label>Password baru</label>
          <div class="pw-wrap">
            <input type="password" id="fieldPwBaru" placeholder="Min. 6 karakter">
            <button class="pw-toggle" onclick="togglePw('fieldPwBaru')" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="field">
          <label>Konfirmasi password baru</label>
          <div class="pw-wrap">
            <input type="password" id="fieldPwKonfirm" placeholder="Ulangi password baru">
            <button class="pw-toggle" onclick="togglePw('fieldPwKonfirm')" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
      </div>
    `;
  }

  async function loadProfile(){
    try {
      const res = await fetch(
        `${SUPA_URL}/rest/v1/warga?kode=eq.${encodeURIComponent(sessionUser.kode)}&select=*`,
        { headers:{ 'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY } }
      );
      const data = await res.json();
      if(data && data.length > 0){
        userData = data[0];
        renderView(userData);
      }
    } catch(e){
      showToast('Gagal memuat profil', true);
    }
  }

  async function saveProfile(){
    const username = document.getElementById('fieldUsername')?.value.trim()||'';
    const bio = document.getElementById('fieldBio')?.value.trim()||'';
    const no_hp = document.getElementById('fieldHp')?.value.trim()||'';
    const alamat = document.getElementById('fieldAlamat')?.value.trim()||'';
    const tgl_lahir = document.getElementById('fieldTglLahir')?.value||'';
    const pwLama = document.getElementById('fieldPwLama')?.value||'';
    const pwBaru = document.getElementById('fieldPwBaru')?.value||'';
    const pwKonfirm = document.getElementById('fieldPwKonfirm')?.value||'';

    // Validate password jika diisi
    if(pwLama || pwBaru || pwKonfirm){
      if(!pwLama||!pwBaru||!pwKonfirm){ showToast('Isi semua field password', true); return; }
      if(pwLama !== userData.password){ showToast('Password lama salah', true); return; }
      if(pwBaru !== pwKonfirm){ showToast('Konfirmasi password tidak cocok', true); return; }
      if(pwBaru.length < 6){ showToast('Password minimal 6 karakter', true); return; }
    }

    const updates = { username, bio, no_hp, alamat, tgl_lahir, updated_at: new Date().toISOString() };
    if(pwBaru) updates.password = pwBaru;

    try {
      const res = await fetch(
        `${SUPA_URL}/rest/v1/warga?kode=eq.${encodeURIComponent(sessionUser.kode)}`,
        {
          method:'PATCH',
          headers:{
            'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,
            'Content-Type':'application/json','Prefer':'return=representation'
          },
          body: JSON.stringify(updates)
        }
      );
      const updated = await res.json();
      if(updated && updated.length > 0){
        userData = updated[0];
        sessionStorage.setItem('rt37_user', JSON.stringify(userData));
        showToast('Profil berhasil disimpan!');
        setTimeout(() => renderView(userData), 800);
      }
    } catch(e){
      showToast('Gagal menyimpan profil', true);
    }
  }

  function handleFotoChange(input){
    const file = input.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
      const dataUrl = e.target.result;
      const avatarBig = document.getElementById('avatarBig');
      let img = document.getElementById('avatarImg');
      if(!img){ avatarBig.innerHTML=''; img=document.createElement('img'); img.id='avatarImg'; avatarBig.appendChild(img); }
      img.src = dataUrl;
      try {
        await fetch(`${SUPA_URL}/rest/v1/warga?kode=eq.${encodeURIComponent(sessionUser.kode)}`,{
          method:'PATCH',
          headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'},
          body: JSON.stringify({ foto_url: dataUrl })
        });
        userData.foto_url = dataUrl;
        showToast('Foto profil diperbarui!');
      } catch(e){ showToast('Gagal menyimpan foto', true); }
    };
    reader.readAsDataURL(file);
  }

  function togglePw(id){
    const input = document.getElementById(id);
    if(input) input.type = input.type === 'password' ? 'text' : 'password';
  }

  loadProfile();
</script>
</body>
</html>
