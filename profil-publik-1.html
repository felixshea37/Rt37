<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RT 37 — Profil</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap');

  :root{
    --bg:#0a0e0f;
    --card:#12181a;
    --border:#1a2226;
    --border-light:#222b2e;
    --text:#e8ecec;
    --text-dim:#7d8b8d;
    --accent:#3ddc97;
    --accent-dim:#2a3f38;
    --danger:#e2654f;
    --amber:#e0a847;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html{ background:var(--bg); }

  html,body{
    min-height:100%;
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-tap-highlight-color:transparent;
  }

  body{
    background:var(--bg);
    min-height:100vh;
    min-height:100dvh;
  }

  button{ font-family:inherit; }

  /* ---------- Top bar (floats over banner) ---------- */
  .topbar{
    position:sticky;
    top:0;
    z-index:20;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:max(12px, env(safe-area-inset-top)) 14px 12px;
  }

  .icon-btn{
    width:36px;height:36px;
    border-radius:50%;
    background:rgba(10,14,15,0.55);
    backdrop-filter:blur(6px);
    border:none;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    color:var(--text);
  }

  .icon-btn svg{ width:18px;height:18px; }
  .icon-btn:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  /* ---------- Page wrap ---------- */
  .page{
    max-width:480px;
    margin:0 auto;
  }

  /* Banner */
  .banner{
    height:140px;
    margin-top:-58px;
    background:
      radial-gradient(circle at 25% 20%, rgba(61,220,151,0.18), transparent 55%),
      linear-gradient(160deg, #15201f 0%, #0d1314 70%);
    position:relative;
    overflow:hidden;
  }

  .banner::after{
    content:'';
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size:28px 28px;
    opacity:0.4;
    mask-image: linear-gradient(to bottom, black, transparent);
  }

  .banner-num{
    position:absolute;
    right:-10px;
    bottom:-30px;
    font-family:'Archivo',sans-serif;
    font-weight:800;
    font-size:130px;
    color:transparent;
    -webkit-text-stroke:1px rgba(61,220,151,0.18);
    line-height:1;
  }

  /* Identity block */
  .identity{
    padding:0 16px;
    position:relative;
  }

  .identity-top{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    margin-top:-44px;
    margin-bottom:10px;
  }

  .avatar-xl{
    width:84px;height:84px;
    border-radius:50%;
    background:var(--accent-dim);
    color:var(--accent);
    border:4px solid var(--bg);
    display:flex;align-items:center;justify-content:center;
    font-size:30px;font-weight:700;
    flex-shrink:0;
  }

  .edit-btn{
    display:flex;
    align-items:center;
    gap:6px;
    background:var(--border-light);
    border:1px solid var(--border-light);
    color:var(--text);
    border-radius:18px;
    padding:8px 14px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    margin-bottom:6px;
  }

  .edit-btn svg{ width:14px;height:14px; }
  .edit-btn:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  .name-row{
    display:flex;
    align-items:center;
    gap:6px;
    margin-bottom:2px;
  }

  .name-row h1{
    font-family:'Archivo',sans-serif;
    font-weight:700;
    font-size:20px;
  }

  .verified-dot{
    width:16px;height:16px;
    flex-shrink:0;
    color:var(--accent);
  }

  .role-tag{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:13px;
    font-weight:600;
    color:var(--accent);
    margin-bottom:12px;
  }

  .role-tag.warga{ color:var(--text-dim); }

  .role-tag svg{ width:13px;height:13px; }

  .bio{
    font-size:14px;
    line-height:1.55;
    color:var(--text);
    margin-bottom:14px;
  }

  .meta-list{
    display:flex;
    flex-direction:column;
    gap:9px;
    margin-bottom:16px;
  }

  .meta-row{
    display:flex;
    align-items:center;
    gap:9px;
    font-size:13.5px;
    color:var(--text-dim);
  }

  .meta-row svg{ width:15px;height:15px; flex-shrink:0; color:var(--text-dim); }
  .meta-row a{ color:var(--text); text-decoration:none; }
  .meta-row .wa-link{ color:var(--accent); font-weight:600; }

  .add-info-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:none;
    border:1px dashed var(--border-light);
    color:var(--text-dim);
    border-radius:8px;
    padding:7px 12px;
    font-size:12.5px;
    cursor:pointer;
    margin-bottom:16px;
  }

  .add-info-btn svg{ width:13px;height:13px; }

  /* Tabs */
  .tabs{
    display:flex;
    border-bottom:1px solid var(--border);
    margin-top:6px;
  }

  .tab{
    flex:1;
    text-align:center;
    padding:13px 0 11px;
    font-size:13.5px;
    font-weight:600;
    color:var(--text-dim);
    background:none;
    border:none;
    cursor:pointer;
    position:relative;
  }

  .tab.active{ color:var(--text); }

  .tab .indicator{
    position:absolute;
    bottom:0;left:50%;
    transform:translateX(-50%);
    width:28px;height:3px;
    border-radius:3px 3px 0 0;
    background:transparent;
  }

  .tab.active .indicator{ background:var(--accent); }

  /* Reuse post styling */
  .feed-list{ padding-bottom:40px; }

  .post{
    padding:14px 16px;
    border-bottom:1px solid var(--border);
    display:flex;
    gap:12px;
  }

  .post .p-avatar{
    width:38px;height:38px;
    border-radius:50%;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:700;
    background:var(--accent-dim);
    color:var(--accent);
  }

  .post.is-announcement .p-avatar{
    background:rgba(224,168,71,0.15);
    color:var(--amber);
  }

  .post-body{ flex:1; min-width:0; }

  .announcement-tag{
    display:inline-flex;
    align-items:center;
    gap:4px;
    background:rgba(224,168,71,0.12);
    border:1px solid rgba(224,168,71,0.3);
    color:var(--amber);
    font-size:10.5px;
    font-weight:700;
    letter-spacing:0.03em;
    text-transform:uppercase;
    padding:2px 7px 2px 5px;
    border-radius:6px;
    margin-bottom:6px;
  }

  .announcement-tag svg{ width:10px; height:10px; }

  .post-head{
    display:flex;
    align-items:center;
    gap:6px;
    margin-bottom:2px;
  }

  .post-head .meta{
    color:var(--text-dim);
    font-size:12.5px;
  }

  .post-text{
    font-size:14px;
    line-height:1.5;
    color:var(--text);
    margin-bottom:9px;
  }

  .post-actions{
    display:flex;
    align-items:center;
    gap:24px;
    color:var(--text-dim);
    font-size:12.5px;
  }

  .post-actions span{
    display:flex;
    align-items:center;
    gap:5px;
  }

  .post-actions svg{ width:16px;height:16px; }

  .empty-tab{
    text-align:center;
    padding:50px 24px;
    color:var(--text-dim);
  }

  .empty-tab svg{ width:32px;height:32px;margin-bottom:10px;opacity:0.5; }
  .empty-tab p{ font-size:13.5px; line-height:1.5; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; transition-duration:0.01ms !important; }
  }

  /* ---------- Media grid ---------- */
  .media-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:2px;
    padding-bottom:40px;
  }

  .media-item{
    position:relative;
    aspect-ratio:1/1;
    overflow:hidden;
    background:var(--card);
    cursor:pointer;
  }

  .media-item img{
    width:100%;height:100%;
    object-fit:cover;
    display:block;
    transition:transform .25s ease;
  }

  .media-item:hover img{ transform:scale(1.05); }

  .media-item .media-type-badge{
    position:absolute;
    top:6px;right:6px;
    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(4px);
    border-radius:5px;
    padding:3px 5px;
    display:flex;align-items:center;
    color:#fff;
  }

  .media-item .media-type-badge svg{ width:12px;height:12px; }

  .media-item .media-placeholder{
    width:100%;height:100%;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:6px;
    color:var(--text-dim);
    background:var(--card);
  }

  .media-item .media-placeholder svg{ width:22px;height:22px;opacity:0.45; }
  .media-item .media-placeholder span{ font-size:11px;opacity:0.5; }

  /* Lightbox */
  .lightbox{
    display:none;
    position:fixed;
    inset:0;
    z-index:99;
    background:rgba(0,0,0,0.88);
    backdrop-filter:blur(8px);
    align-items:center;justify-content:center;
    flex-direction:column;
    padding:20px;
  }

  .lightbox.open{ display:flex; }

  .lightbox img{
    max-width:100%;
    max-height:75vh;
    border-radius:10px;
    object-fit:contain;
  }

  .lightbox-caption{
    margin-top:12px;
    font-size:13px;
    color:var(--text-dim);
    text-align:center;
  }

  .lightbox-close{
    position:absolute;
    top:max(16px,env(safe-area-inset-top));
    right:16px;
    background:rgba(255,255,255,0.08);
    border:none;
    border-radius:50%;
    width:36px;height:36px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    color:#fff;
  }

  .lightbox-close svg{ width:18px;height:18px; }
</style>
</head>
<body>

  <div class="topbar">
    <button class="icon-btn" aria-label="Kembali" onclick="window.history.back()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>
    <button class="icon-btn" aria-label="Menu lainnya">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="6" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="18" r="1.4"/></svg>
    </button>
  </div>

  <div class="page">
    <div class="banner">
      <div class="banner-num">37</div>
    </div>

    <div class="identity">
      <div class="identity-top">
        <div class="avatar-xl">Y</div>
        <button class="edit-btn" onclick="location.href='pengaturan.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
          Edit profil
        </button>
      </div>

      <div class="name-row">
        <h1>Yolina</h1>
        <svg class="verified-dot" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1l2.6 2.4 3.4-.6 1 3.3 3.3 1-.6 3.4L24 12.5l-2.3 2.4.6 3.4-3.3 1-1 3.3-3.4-.6L12 24l-2.6-2.4-3.4.6-1-3.3-3.3-1 .6-3.4L0 12.5l2.3-2.4-.6-3.4 3.3-1 1-3.3 3.4.6z"/><path d="M9 12.5l2 2 4-4.5" stroke="#06150f" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>

      <div class="role-tag" id="roleTag">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z"/></svg>
        Kepala Keluarga &middot; Blok C No. 14
      </div>

      <p class="bio">Suka mancing 🎣 dan ngebantu beres-beres acara RT kalau lagi libur. Mampir aja kalau butuh apa-apa.</p>

      <div class="meta-list">
        <div class="meta-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          <a href="#" class="wa-link">0812-3456-7890 (WhatsApp)</a>
        </div>
        <div class="meta-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Blok C No. 14, RT 37
        </div>
        <div class="meta-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Lahir 12 April 1996
        </div>
        <div class="meta-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16.5 14.5"/></svg>
          Bergabung Maret 2026
        </div>
      </div>

      <button class="add-info-btn" id="addInfoBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Tambah info kontak (email, dll)
      </button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="posts">
        Postingan
        <span class="indicator"></span>
      </button>
      <button class="tab" data-tab="comments">
        Komentar
        <span class="indicator"></span>
      </button>
      <button class="tab" data-tab="media">
        Media
        <span class="indicator"></span>
      </button>
    </div>

    <div class="feed-list" id="feedList"></div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose" aria-label="Tutup">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-caption" id="lightboxCaption"></div>
  </div>

<script>
  const myPosts = [
    {
      isAnnouncement: false,
      time: '2 hari lalu',
      text: 'Ada yang mau ikut kerja bakti hari Minggu? Sekalian bawa alat masing-masing ya.',
      likes: 6,
      comments: 2
    },
    {
      isAnnouncement: false,
      time: '1 minggu lalu',
      text: 'Proposal renovasi pos satpam udah aku kirim ke grup WA, mohon dicek ya pak/bu.',
      likes: 9,
      comments: 4
    },
    {
      isAnnouncement: false,
      time: '2 minggu lalu',
      text: 'Selamat siang warga RT 37, mau nanya jadwal posyandu bulan ini kapan ya?',
      likes: 2,
      comments: 1
    }
  ];

  const myMedia = [
    { type:'image', src:'https://picsum.photos/seed/rt37a/300/300', caption:'Kerja bakti RT 37 — Maret 2026' },
    { type:'image', src:'https://picsum.photos/seed/rt37b/300/300', caption:'Acara bersih-bersih selokan' },
    { type:'video', src:'https://picsum.photos/seed/rt37c/300/300', caption:'Clip gotongroyong minggu kemarin' },
    { type:'image', src:'https://picsum.photos/seed/rt37d/300/300', caption:'Renovasi pos satpam' },
    { type:'image', src:'https://picsum.photos/seed/rt37e/300/300', caption:'Foto bareng warga blok C' },
    { type:'image', src:'https://picsum.photos/seed/rt37f/300/300', caption:'Mancing di danau belakang perumahan 🎣' },
  ];

  // Lightbox
  const lightbox     = document.getElementById('lightbox');
  const lightboxImg  = document.getElementById('lightboxImg');
  const lightboxCap  = document.getElementById('lightboxCaption');

  function openLightbox(src, caption){
    lightboxImg.src = src;
    lightboxCap.textContent = caption;
    lightbox.classList.add('open');
  }

  document.getElementById('lightboxClose').addEventListener('click', () => {
    lightbox.classList.remove('open');
    lightboxImg.src = '';
  });

  lightbox.addEventListener('click', e => {
    if(e.target === lightbox) lightbox.classList.remove('open');
  });
    { time: '32 menit lalu', text: 'Tambahin tarik tambang dong', onPost: 'Proposal acara 17an — Sari' },
    { time: '5 jam lalu', text: 'Aku ada, nanti tar malam ke rumah ya', onPost: 'Pinjam bor listrik — Dimas' }
  ];

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderFeed(tab){
    const list = document.getElementById('feedList');
    list.className = 'feed-list';
    list.id = 'feedList';

    if(tab === 'posts'){
      if(myPosts.length === 0){
        list.innerHTML = `<div class="empty-tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <p>Belum ada postingan.</p>
        </div>`;
        return;
      }
      list.innerHTML = myPosts.map(p => `
        <div class="post ${p.isAnnouncement ? 'is-announcement' : ''}">
          <div class="p-avatar">Y</div>
          <div class="post-body">
            ${p.isAnnouncement ? `
              <div class="announcement-tag">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M3 11l18-5v12L3 13z"/><path d="M11 13.5V18a2 2 0 0 0 4 0v-1"/></svg>
                Pengumuman RT
              </div>
            ` : ''}
            <div class="post-head">
              <span style="font-weight:700;font-size:14px;">Yolina</span>
              <span class="meta">&middot; ${p.time}</span>
            </div>
            <p class="post-text">${escapeHtml(p.text)}</p>
            <div class="post-actions">
              <span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
                ${p.likes}
              </span>
              <span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-1.9 5.4 8.5 8.5 0 0 1-6.6 3.1 8.4 8.4 0 0 1-3.9-1L3 21l1.9-5.7a8.38 8.38 0 0 1-1-3.8 8.5 8.5 0 0 1 3.1-6.6 8.38 8.38 0 0 1 5.4-1.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                ${p.comments}
              </span>
            </div>
          </div>
        </div>
      `).join('');
    } else if(tab === 'media'){
      if(myMedia.length === 0){
        list.innerHTML = `<div class="empty-tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <p>Belum ada foto atau video.</p>
        </div>`;
        return;
      }
      list.className = 'media-grid';
      list.id = 'feedList';
      list.innerHTML = myMedia.map(m => `
        <div class="media-item" onclick="openLightbox('${m.src}','${escapeHtml(m.caption)}')">
          <img src="${m.src}" alt="${escapeHtml(m.caption)}" loading="lazy">
          ${m.type === 'video' ? `
            <div class="media-type-badge">
              <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>
            </div>` : ''}
        </div>
      `).join('');
    } else {
        list.innerHTML = `<div class="empty-tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 11.5a8.38 8.38 0 0 1-1.9 5.4 8.5 8.5 0 0 1-6.6 3.1 8.4 8.4 0 0 1-3.9-1L3 21l1.9-5.7a8.38 8.38 0 0 1-1-3.8 8.5 8.5 0 0 1 3.1-6.6 8.38 8.38 0 0 1 5.4-1.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
          <p>Belum ada komentar.</p>
        </div>`;
        return;
      }
      list.innerHTML = myComments.map(c => `
        <div class="post">
          <div class="p-avatar">Y</div>
          <div class="post-body">
            <div class="post-head">
              <span style="font-weight:700;font-size:14px;">Yolina</span>
              <span class="meta">&middot; ${c.time}</span>
            </div>
            <div class="meta-row" style="margin-bottom:6px;font-size:12px;">pada "${escapeHtml(c.onPost)}"</div>
            <p class="post-text">${escapeHtml(c.text)}</p>
          </div>
        </div>
      `).join('');
    }
  }

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderFeed(tab.dataset.tab);
    });
  });

  document.getElementById('addInfoBtn').addEventListener('click', () => {
    alert('Tambah info kontak lain (email, dll) — segera disusul.');
  });

  renderFeed('posts');
</script>

</body>
</html>
