<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RT 37</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap');

  :root{
    --bg:#0a0e0f;
    --card:#12181a;
    --border:#1a2226;
    --border-light:#222b2e;
    --text:#e8ecec;
    --text-dim:#7d8b8d;
    --accent:#3ddc97;
    --accent-dim:#2a3f38;
    --danger:#e2654f;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html,body{
    height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
  }

  body{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:24px;
  }

  /* Background watermark numeral */
  .bg-numeral{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-family:'Archivo',sans-serif;
    font-weight:800;
    font-size:min(70vw, 640px);
    line-height:1;
    color:transparent;
    -webkit-text-stroke:1px var(--border-light);
    user-select:none;
    pointer-events:none;
    z-index:0;
    letter-spacing:-0.04em;
  }

  .bg-grid{
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size:48px 48px;
    opacity:0.35;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 0%, transparent 75%);
    z-index:0;
  }

  .wrap{
    position:relative;
    z-index:1;
    width:100%;
    max-width:400px;
  }

  .eyebrow{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:28px;
    justify-content:center;
  }

  .eyebrow .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 8px var(--accent);
  }

  .eyebrow span{
    font-size:12px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--text-dim);
    font-weight:500;
  }

  .card{
    background:var(--card);
    border:1px solid var(--border-light);
    border-radius:18px;
    padding:36px 28px 28px;
    box-shadow:0 24px 60px -20px rgba(0,0,0,0.6);
  }

  .title-row{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-bottom:6px;
  }

  .title-row h1{
    font-family:'Archivo',sans-serif;
    font-weight:800;
    font-size:30px;
    letter-spacing:-0.01em;
  }

  .title-row .num{
    color:var(--accent);
  }

  .subtitle{
    color:var(--text-dim);
    font-size:13.5px;
    margin-bottom:30px;
    line-height:1.5;
  }

  .field{
    margin-bottom:16px;
  }

  .field label{
    display:block;
    font-size:11.5px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:8px;
    font-weight:600;
  }

  .input-shell{
    position:relative;
    display:flex;
    align-items:center;
  }

  .input-shell svg{
    position:absolute;
    left:14px;
    width:16px;height:16px;
    color:var(--text-dim);
    pointer-events:none;
  }

  input{
    width:100%;
    background:#0d1314;
    border:1px solid var(--border-light);
    border-radius:10px;
    padding:13px 14px 13px 40px;
    font-size:14.5px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    transition:border-color 0.15s ease, background 0.15s ease;
    letter-spacing:0.02em;
  }

  input::placeholder{
    color:#4a5658;
    letter-spacing:0;
  }

  input:focus{
    outline:none;
    border-color:var(--accent);
    background:#0f1617;
  }

  input:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:1px;
  }

  .toggle-pw{
    position:absolute;
    right:12px;
    background:none;
    border:none;
    color:var(--text-dim);
    font-size:11.5px;
    cursor:pointer;
    padding:6px;
    font-family:'Inter',sans-serif;
    font-weight:500;
    letter-spacing:0.02em;
  }

  .toggle-pw:hover{ color:var(--text); }
  .toggle-pw:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; border-radius:4px; }

  .error-msg{
    display:none;
    align-items:center;
    gap:8px;
    background:rgba(226,101,79,0.08);
    border:1px solid rgba(226,101,79,0.3);
    color:var(--danger);
    font-size:13px;
    border-radius:10px;
    padding:11px 13px;
    margin-bottom:16px;
    line-height:1.4;
  }

  .error-msg.show{ display:flex; }
  .error-msg svg{ flex-shrink:0; width:15px; height:15px; }

  button.submit{
    width:100%;
    background:var(--accent);
    color:#06150f;
    border:none;
    border-radius:10px;
    padding:14px;
    font-size:14.5px;
    font-weight:700;
    font-family:'Inter',sans-serif;
    cursor:pointer;
    margin-top:6px;
    transition:filter 0.15s ease, transform 0.05s ease;
    letter-spacing:0.01em;
  }

  button.submit:hover{ filter:brightness(1.08); }
  button.submit:active{ transform:scale(0.99); }
  button.submit:focus-visible{ outline:2px solid var(--text); outline-offset:2px; }

  button.submit:disabled{
    background:var(--border-light);
    color:var(--text-dim);
    cursor:not-allowed;
  }

  .submit-spinner{
    display:none;
    width:15px;height:15px;
    border:2px solid rgba(6,21,15,0.3);
    border-top-color:#06150f;
    border-radius:50%;
    margin:0 auto;
    animation:spin 0.6s linear infinite;
  }

  @keyframes spin{ to{ transform:rotate(360deg); } }

  .footnote{
    text-align:center;
    color:var(--text-dim);
    font-size:12.5px;
    margin-top:22px;
    line-height:1.6;
  }

  .footnote b{ color:var(--text); font-weight:600; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; transition-duration:0.01ms !important; }
  }
</style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-numeral">37</div>

  <div class="wrap">
    <div class="eyebrow">
      <span class="dot"></span>
      <span>Sistem Warga &middot; Lingkungan</span>
    </div>

    <div class="card">
      <div class="title-row">
        <h1>RT <span class="num">37</span></h1>
      </div>
      <p class="subtitle">Masuk dengan kode dan sandi yang diberikan pengurus RT.</p>

      <div class="error-msg" id="errorMsg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="13"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errorText">Kode atau sandi salah. Coba lagi.</span>
      </div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="kode">Kode warga</label>
          <div class="input-shell">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            <input type="text" id="kode" name="kode" placeholder="contoh: RT37-014" autocomplete="username" autocapitalize="characters">
          </div>
        </div>

        <div class="field">
          <label for="sandi">Sandi</label>
          <div class="input-shell">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="sandi" name="sandi" placeholder="••••••••" autocomplete="current-password" style="padding-right:54px;">
            <button type="button" class="toggle-pw" id="togglePw">Lihat</button>
          </div>
        </div>

        <button type="submit" class="submit" id="submitBtn">
          <span id="submitLabel">Masuk</span>
          <div class="submit-spinner" id="submitSpinner"></div>
        </button>
      </form>
    </div>

    <p class="footnote">Belum punya kode? Hubungi <b>pengurus RT</b> untuk didaftarkan.</p>
  </div>

<script>
  // ---- Dummy data, akan diganti backend asli nanti ----
  const DUMMY_USERS = {
    'RT37-014': { sandi: 'warga123', nama: 'Yolina' },
    'RT37-001': { sandi: 'admin123', nama: 'Pak RT' }
  };

  const form = document.getElementById('loginForm');
  const kodeInput = document.getElementById('kode');
  const sandiInput = document.getElementById('sandi');
  const errorMsg = document.getElementById('errorMsg');
  const errorText = document.getElementById('errorText');
  const submitBtn = document.getElementById('submitBtn');
  const submitLabel = document.getElementById('submitLabel');
  const submitSpinner = document.getElementById('submitSpinner');
  const togglePw = document.getElementById('togglePw');

  togglePw.addEventListener('click', () => {
    const isPw = sandiInput.type === 'password';
    sandiInput.type = isPw ? 'text' : 'password';
    togglePw.textContent = isPw ? 'Sembunyikan' : 'Lihat';
  });

  function showError(msg){
    errorText.textContent = msg;
    errorMsg.classList.add('show');
  }

  function hideError(){
    errorMsg.classList.remove('show');
  }

  [kodeInput, sandiInput].forEach(el => el.addEventListener('input', hideError));

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    hideError();

    const kode = kodeInput.value.trim().toUpperCase();
    const sandi = sandiInput.value;

    if(!kode || !sandi){
      showError('Kode dan sandi wajib diisi.');
      return;
    }

    submitBtn.disabled = true;
    submitLabel.style.display = 'none';
    submitSpinner.style.display = 'block';

    setTimeout(() => {
      const user = DUMMY_USERS[kode];
      submitBtn.disabled = false;
      submitLabel.style.display = 'block';
      submitSpinner.style.display = 'none';

      if(!user || user.sandi !== sandi){
        showError('Kode atau sandi salah. Coba lagi.');
        return;
      }

      // Sukses (dummy) — nanti redirect ke feed
      submitLabel.textContent = 'Berhasil, mengalihkan...';
      submitLabel.style.display = 'block';
      alert('Login berhasil sebagai ' + user.nama + ' (ini simulasi, belum nyambung backend asli)');
    }, 600);
  });
</script>

</body>
</html>
