<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk — RT 37 Network</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg:#06050f;
    --card:#0d0b1a;
    --border:#1a1235;
    --border-light:#241a42;
    --text:#e0d8ff;
    --text-dim:#6b5f9e;
    --accent:#00f5ff;
    --accent-dim:#00f5ff18;
    --accent2:#ff00c8;
    --accent2-dim:#ff00c818;
    --danger:#ff2d6b;
    --amber:#f5e642;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html{ background:var(--bg); }
  html,body{
    min-height:100%;
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  body{
    background:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px),
      var(--bg);
    background-size: 32px 32px, 32px 32px, 100%;
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
  }

  button, a{ font-family:inherit; }
  a{ text-decoration:none; color:inherit; }

  .page{
    max-width:480px;
    margin:0 auto;
    width:100%;
    flex:1;
    display:flex;
    flex-direction:column;
    padding:0 24px;
  }

  .back-btn{
    width:34px;height:34px;
    border-radius:50%;
    background:none;
    border:none;
    color:var(--text);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    margin:max(16px, env(safe-area-inset-top)) 0 0 -6px;
    flex-shrink:0;
  }
  .back-btn svg{ width:19px;height:19px; }

  .login-brand{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin:18px 0 30px;
  }
  .login-brand-icon{
    width:56px;height:56px;
    border-radius:16px;
    background:rgba(0,245,255,0.08);
    border:1px solid rgba(0,245,255,0.3);
    display:flex;align-items:center;justify-content:center;
    color:var(--accent);
    margin-bottom:14px;
    box-shadow:0 0 22px rgba(0,245,255,0.15);
  }
  .login-brand-icon svg{ width:28px;height:28px; }
  .login-title{
    font-family:'Orbitron',sans-serif;
    font-weight:800;
    font-size:21px;
    margin-bottom:6px;
  }
  .login-title .num{ color:var(--accent); }
  .login-sub{
    font-size:13px;
    color:var(--text-dim);
  }

  .form-group{
    margin-bottom:16px;
  }
  .form-label{
    display:block;
    font-size:12px;
    font-weight:700;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:0.4px;
    margin-bottom:8px;
  }
  .form-input-wrap{
    position:relative;
    display:flex;
    align-items:center;
  }
  .form-input-wrap svg{
    position:absolute;
    left:14px;
    width:16px;height:16px;
    color:var(--text-dim);
    pointer-events:none;
  }
  .form-input{
    width:100%;
    background:rgba(255,255,255,0.03);
    border:1px solid var(--border-light);
    border-radius:12px;
    padding:14px 14px 14px 42px;
    color:var(--text);
    font-size:14.5px;
    outline:none;
    font-family:inherit;
    transition:border-color .15s;
  }
  .form-input:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(0,245,255,0.08);
  }
  .form-input::placeholder{ color:var(--text-dim); opacity:0.6; }

  .toggle-pw-btn{
    position:absolute;
    right:10px;
    width:30px;height:30px;
    border-radius:8px;
    background:none;
    border:none;
    color:var(--text-dim);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .toggle-pw-btn svg{ width:16px;height:16px;position:static; }

  .form-error{
    display:none;
    align-items:center;
    gap:7px;
    background:rgba(255,45,107,0.08);
    border:1px solid rgba(255,45,107,0.3);
    color:#ff5c87;
    font-size:12.5px;
    font-weight:600;
    padding:10px 13px;
    border-radius:10px;
    margin-bottom:16px;
  }
  .form-error.show{ display:flex; }
  .form-error svg{ width:15px;height:15px;flex-shrink:0; }

  .login-submit{
    width:100%;
    background:var(--accent);
    color:#06150f;
    border:none;
    border-radius:14px;
    padding:15px 24px;
    font-size:15px;
    font-weight:800;
    cursor:pointer;
    margin-top:6px;
    box-shadow:0 0 24px rgba(0,245,255,0.3), 0 6px 18px rgba(0,0,0,0.35);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  .login-submit:disabled{
    opacity:0.6;
    cursor:default;
    box-shadow:none;
  }
  .login-submit svg{ width:17px;height:17px; }

  .login-spinner{
    width:16px;height:16px;
    border:2px solid rgba(6,21,15,0.3);
    border-top-color:#06150f;
    border-radius:50%;
    animation:spin .7s linear infinite;
    display:none;
  }
  .login-submit.loading .login-spinner{ display:inline-block; }
  .login-submit.loading .submit-label,
  .login-submit.loading svg:not(.login-spinner){ display:none; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .login-footer-note{
    text-align:center;
    font-size:12px;
    color:var(--text-dim);
    margin-top:20px;
    line-height:1.6;
  }
  .login-footer-note a{
    color:var(--accent);
    font-weight:600;
  }

  .login-bottom-spacer{ flex:1; }

  .page-footer{
    text-align:center;
    padding:18px 0 max(20px, env(safe-area-inset-bottom));
    font-size:11px;
    color:var(--text-dim);
    opacity:0.6;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; transition-duration:0.01ms !important; }
  }
</style>
</head>
<body>

<div class="page">

  <button class="back-btn" id="backBtn" aria-label="Kembali">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><polyline points="15 18 9 12 15 6"/></svg>
  </button>

  <div class="login-brand">
    <div class="login-brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <div class="login-title">RT <span class="num">37</span> Network</div>
    <div class="login-sub">Masuk dengan kode rumah dan password Anda</div>
  </div>

  <div class="form-error" id="formError">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="formErrorText">Kode rumah atau password salah.</span>
  </div>

  <form id="loginForm">
    <div class="form-group">
      <label class="form-label" for="kodeRumah">Kode Rumah</label>
      <div class="form-input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <input type="text" id="kodeRumah" class="form-input" placeholder="Contoh: RT37-A01" autocomplete="username" autocapitalize="characters">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="form-input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" class="form-input" placeholder="Masukkan password" autocomplete="current-password" style="padding-right:44px;">
        <button type="button" class="toggle-pw-btn" id="togglePw" aria-label="Lihat password">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button type="submit" class="login-submit" id="loginSubmit">
      <span class="login-spinner"></span>
      <span class="submit-label">Masuk</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </form>

  <p class="login-footer-note">
    Belum punya akun atau lupa password?<br>
    Hubungi <a href="#">pengurus RT 37</a> untuk dibantu.
  </p>

  <div class="login-bottom-spacer"></div>

  <div class="page-footer">RT 37 Network — Kel. Sukamaju</div>

</div>

<script>
  const backBtn = document.getElementById('backBtn');
  const loginForm = document.getElementById('loginForm');
  const loginSubmit = document.getElementById('loginSubmit');
  const kodeRumahInput = document.getElementById('kodeRumah');
  const passwordInput = document.getElementById('password');
  const togglePw = document.getElementById('togglePw');
  const formError = document.getElementById('formError');
  const formErrorText = document.getElementById('formErrorText');

  backBtn.addEventListener('click', () => {
    window.location.href = 'index.html';
  });

  togglePw.addEventListener('click', () => {
    const isPw = passwordInput.type === 'password';
    passwordInput.type = isPw ? 'text' : 'password';
  });

  function showError(msg){
    formErrorText.textContent = msg;
    formError.classList.add('show');
  }
  function hideError(){
    formError.classList.remove('show');
  }

  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    hideError();

    const kode = kodeRumahInput.value.trim();
    const pw = passwordInput.value.trim();

    if(!kode || !pw){
      showError('Kode rumah dan password wajib diisi.');
      return;
    }

    loginSubmit.classList.add('loading');
    loginSubmit.disabled = true;

    // TODO: ganti dengan pengecekan ke backend/Supabase
    setTimeout(() => {
      loginSubmit.classList.remove('loading');
      loginSubmit.disabled = false;
      showError('Kode rumah atau password salah. Silakan coba lagi.');
    }, 900);
  });
</script>

</body>
</html>
